<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant for Al-Quran Santri</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .user-message {
            justify-content: flex-end;
        }
        .ai-message {
            justify-content: flex-start;
        }
        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        .user-bubble {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
        }
        .ai-bubble {
            background: white;
            border: 2px solid #28a745;
            color: #1e3c72;
        }
        .chat-input {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        #userInput {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 1em;
        }
        #userInput:focus {
            border-color: #28a745;
        }
        #sendBtn {
            margin-left: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        #sendBtn:hover {
            transform: translateY(-2px);
        }
        .typing {
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🤖 AI Santri Assistant - Al-Quran Helper</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">
                <div class="message-bubble ai-bubble">
                    Assalamu'alaikum! Saya AI Assistant untuk santri Al-Quran. Saya bisa membantu dengan info wakaf, ayat Quran, atau pertanyaan santri. Apa yang bisa saya bantu? 😊
                </div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Ketik pesan Anda..." autocomplete="off">
            <button id="sendBtn">Kirim</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // AI Responses database (keyword-based "AI")
        const responses = {
            greetings: [
                "Wa'alaikumsalam! Semoga hari Anda penuh berkah. Ada yang bisa dibantu?",
                "Assalamu'alaikum! Siap membantu santri Al-Quran."
            ],
            quran: [
                "Al-Quran adalah petunjuk terbaik. Coba baca Surah Al-Fatihah untuk memulai hari.",
                "Wakaf Al-Quran adalah sedekah jariyah. Bantu santri pedalaman dengan donasi mushaf!"
            ],
            wakaf: [
                "Wakaf Al-Quran untuk santri! Pahala jariyah abadi. Info lebih lanjut di situs wakaf.",
                "Sedekah mushaf untuk orang tua tercinta atau santri buta huruf. Mari berwakaf!"
            ],
            santri: [
                "Santri kuat dengan Al-Quran. Berantas buta huruf dengan wakaf mushaf!",
                "Rezeki lancar dengan wakaf Al-Quran. Bantu ekspedisi Quran untuk Aceh."
            ],
            default: [
                "Maaf, saya belum paham. Coba tanya tentang Quran, wakaf, atau santri.",
                "Saya AI sederhana. Kata kunci: salam, quran, wakaf, santri. 😊"
            ]
        };

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isUser ? 'user-bubble' : 'ai-bubble'}`;
            bubble.textContent = text;
            messageDiv.appendChild(bubble);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function getAIResponse(input) {
            const lowerInput = input.toLowerCase();
            if (lowerInput.includes('assalam') || lowerInput.includes('salam')) {
                return responses.greetings[Math.floor(Math.random() * responses.greetings.length)];
            } else if (lowerInput.includes('quran') || lowerInput.includes('al-quran')) {
                return responses.quran[Math.floor(Math.random() * responses.quran.length)];
            } else if (lowerInput.includes('wakaf')) {
                return responses.wakaf[Math.floor(Math.random() * responses.wakaf.length)];
            } else if (lowerInput.includes('santri')) {
                return responses.santri[Math.floor(Math.random() * responses.santri.length)];
            } else {
                return responses.default[Math.floor(Math.random() * responses.default.length)];
            }
        }

        function sendMessage() {
            const input = userInput.value.trim();
            if (input === '') return;

            addMessage(input, true);
            userInput.value = '';

            // Simulate typing
            addMessage('AI sedang mengetik...', false);
            setTimeout(() => {
                const lastTyping = chatMessages.lastElementChild;
                lastTyping.remove();
                const response = getAIResponse(input);
                addMessage(response, false);
            }, 1000);
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Focus input on load
        userInput.focus();
    </script>
</body>
</html>
